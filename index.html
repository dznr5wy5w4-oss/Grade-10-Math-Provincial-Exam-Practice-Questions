<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathematics 10 Full Practice Exam — Nova Scotia (8 Units)</title>
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border: #e5e3dc;
    --border-strong: #d3d1c7;
    --info-bg: #E6F1FB;
    --info-text: #0C447C;
    --success-bg: #EAF3DE;
    --success-text: #27500A;
    --success-border: #97C459;
    --danger-bg: #FCEBEB;
    --danger-text: #791F1F;
    --danger-border: #E24B4A;
    --hot-bg: #FBEAF0;
    --hot-text: #72243E;
    --u1-bg: #EEEDFE; --u1-text: #3C3489;
    --u2-bg: #E6F1FB; --u2-text: #0C447C;
    --u3-bg: #FAEEDA; --u3-text: #633806;
    --u4-bg: #E1F5EE; --u4-text: #085041;
    --u5-bg: #FAECE7; --u5-text: #712B13;
    --u6-bg: #FCEBEB; --u6-text: #791F1F;
    --u7-bg: #EAF3DE; --u7-text: #27500A;
    --u8-bg: #FBEAF0; --u8-text: #72243E;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    margin: 0; padding: 2rem 1rem; line-height: 1.6;
  }
  .container { max-width: 780px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 500; margin: 0 0 0.25rem; }
  h2 { font-size: 20px; font-weight: 500; margin: 0 0 0.5rem; }
  .subtitle { font-size: 14px; color: var(--text-secondary); margin: 0 0 1.5rem; }
  .topic-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
  .topic-pill { font-size: 12px; padding: 4px 10px; border-radius: 999px; }
  .hotzone-pill {
    font-size: 11px; padding: 3px 8px; border-radius: 999px;
    background: var(--hot-bg); color: var(--hot-text);
    margin-left: 6px;
  }
  .progress-wrap { margin-bottom: 1rem; }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;
  }
  .progress-track {
    height: 4px; background: var(--border);
    border-radius: 999px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: var(--info-text);
    transition: width 0.3s;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .question-text {
    font-size: 16px; margin-bottom: 1rem; white-space: pre-wrap;
  }
  .figure {
    margin: 1rem 0; padding: 1rem;
    background: var(--bg); border-radius: 8px; text-align: center;
  }
  button {
    font-family: inherit; font-size: 14px;
    padding: 10px 16px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: 8px;
    cursor: pointer; transition: all 0.15s;
  }
  button:hover:not(:disabled) {
    background: var(--bg); border-color: var(--text-tertiary);
  }
  button:disabled { cursor: default; opacity: 1; }
  .option-btn {
    display: block; width: 100%; text-align: left;
    margin-bottom: 8px; padding: 12px 16px;
    font-size: 14px; line-height: 1.5; white-space: normal;
  }
  .option-btn.correct {
    background: var(--success-bg) !important;
    color: var(--success-text);
    border-color: var(--success-border);
  }
  .option-btn.incorrect {
    background: var(--danger-bg) !important;
    color: var(--danger-text);
    border-color: var(--danger-border);
  }
  .feedback {
    margin-top: 1rem; padding: 12px 16px;
    border-radius: 8px; font-size: 14px; display: none;
  }
  .feedback.show { display: block; }
  .feedback.right { background: var(--success-bg); color: var(--success-text); }
  .feedback.wrong { background: var(--danger-bg); color: var(--danger-text); }
  .nav-row { display: flex; justify-content: space-between; gap: 8px; }
  .results { display: none; padding: 2rem 0; }
  .breakdown {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px; margin: 1.5rem 0;
  }
  .breakdown-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .breakdown-label {
    font-size: 12px; padding: 3px 10px;
    border-radius: 999px; display: inline-block; margin-bottom: 8px;
  }
  .breakdown-score { font-size: 24px; font-weight: 500; }
  .results-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  textarea {
    width: 100%; min-height: 120px; padding: 12px;
    font-family: inherit; font-size: 14px;
    border: 1px solid var(--border-strong); border-radius: 8px;
    resize: vertical; margin-bottom: 0.5rem;
    background: var(--surface); color: var(--text);
  }
  .solution-block {
    margin-top: 1rem; padding: 14px 16px;
    background: var(--info-bg); color: var(--info-text);
    border-radius: 8px; font-size: 14px;
    display: none; white-space: pre-wrap;
  }
  .solution-block.show { display: block; }
  .figure svg { max-width: 100%; height: auto; }
  hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .jump-select {
    font-family: inherit; font-size: 13px;
    padding: 8px 10px; max-width: 100%;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: 8px;
  }
  .filter-row {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 1rem; flex-wrap: wrap;
  }
  .filter-row label { font-size: 13px; color: var(--text-secondary); }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a; --surface: #262624;
      --text: #f5f5f3; --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --border: #3a3a37; --border-strong: #555550;
      --info-bg: #0C447C; --info-text: #B5D4F4;
      --success-bg: #27500A; --success-text: #C0DD97;
      --success-border: #639922;
      --danger-bg: #791F1F; --danger-text: #F7C1C1;
      --danger-border: #E24B4A;
      --hot-bg: #72243E; --hot-text: #F4C0D1;
      --u1-bg: #3C3489; --u1-text: #CECBF6;
      --u2-bg: #0C447C; --u2-text: #B5D4F4;
      --u3-bg: #633806; --u3-text: #FAC775;
      --u4-bg: #085041; --u4-text: #9FE1CB;
      --u5-bg: #712B13; --u5-text: #F5C4B3;
      --u6-bg: #791F1F; --u6-text: #F7C1C1;
      --u7-bg: #27500A; --u7-text: #C0DD97;
      --u8-bg: #72243E; --u8-text: #F4C0D1;
    }
    .figure svg text { fill: #f5f5f3 !important; }
    .figure svg polygon, .figure svg line, .figure svg rect:not([fill="none"]),
    .figure svg circle, .figure svg path { stroke: #b5d4f4; }
  }
</style>
</head>
<body>
<div class="container">

  <header id="header">
    <h1>Mathematics 10 — full practice exam</h1>
    <p class="subtitle">Nova Scotia · all 8 HRCE units · 67 questions · hot zones flagged · instant feedback</p>
  </header>

  <div class="topic-bar" id="topic-bar"></div>

  <div class="filter-row">
    <label for="jump">Jump to:</label>
    <select id="jump" class="jump-select"></select>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-meta">
      <span id="qcount">Question 1</span>
      <span id="score">Score: 0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <div class="card" id="question-card">
    <div style="margin-bottom: 0.75rem;">
      <span class="topic-pill" id="topic-pill"></span>
      <span class="hotzone-pill" id="hotzone-pill" style="display: none;">⚠ hot zone</span>
    </div>
    <div class="question-text" id="question-text"></div>
    <div id="question-figure"></div>
    <div id="options"></div>
    <div id="written-area" style="display: none;">
      <textarea id="written-answer" placeholder="Write your work and final answer here..."></textarea>
      <div>
        <button id="reveal-btn">Reveal full solution</button>
      </div>
      <div class="solution-block" id="solution-block"></div>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="nav-row" id="nav-row">
    <button id="prev-btn">← Previous</button>
    <button id="next-btn">Next →</button>
  </div>

  <div class="results" id="results">
    <h2>Practice exam complete</h2>
    <p id="results-summary" class="subtitle"></p>
    <div class="breakdown" id="results-breakdown"></div>
    <div class="results-actions">
      <button id="restart-btn">Restart exam</button>
      <button id="review-btn">Review my answers</button>
    </div>
    <hr>
    <p style="font-size: 13px; color: var(--text-secondary);">
      Note: written-response questions are self-graded. Compare your work to the revealed solution.
    </p>
  </div>

</div>

<script>
const questions = [
  // ===================================================================
  // UNIT 1 — RELATIONS & FUNCTIONS
  // ===================================================================
  {
    type: "mc", topic: "Unit 1 · Relations & Functions",
    q: "Which of the following relations is a function?",
    options: [
      "{(Jan, 28), (Feb, 29), (Feb, 28), (Mar, 30)}",
      "Graph showing horizontal segments with multiple x-values per y-value",
      "{(0, 3), (1, 4), (2, 3), (3, 1)}",
      "{(NS, Sydney), (NB, St. John), (PEI, Summerside), (NS, Digby)}"
    ],
    correct: 2,
    explain: "A function maps each input to exactly one output. {(0,3), (1,4), (2,3), (3,1)} has all distinct x-values. The NS option fails — NS pairs with both Sydney and Digby."

  {
    type: "mc", topic: "Unit 1 · Relations & Functions",

    options: ["(−2, 4]", "[−2, 4)", "(1, 6]", "[1, 6)"],
    correct: 0,
    explain: "Domain = set of x-values. Open circle at x = −2 (excluded), closed circle at x = 4 (included). Interval notation: (−2, 4]."
  },
  {
    type: "mc", topic: "Unit 1 · Relations & Functions",
    q: "If g(x) = 4 − 3x, what is g(−2)?",
    options: ["10", "−2", "2", "0.67"],
    correct: 0,
    explain: "g(−2) = 4 − 3(−2) = 4 + 6 = 10."
  },
  {
    type: "mc", topic: "Unit 1 · Relations & Functions",
    q: "If g(x) = 4 − 3x², what is g(−2)?",
    options: ["−32", "−8", "16", "40"],
    correct: 1,
    explain: "g(−2) = 4 − 3(−2)² = 4 − 3(4) = 4 − 12 = −8. Watch the order: square first, then multiply by −3."
  },
  {
    type: "mc", topic: "Unit 1 · Relations & Functions",
    q: "A container narrows in the middle (hourglass-shaped) and is filled at a constant rate. Which graph best illustrates the water level over time?",
    options: [
      "Constantly steepening curve",
      "Steady linear increase (straight line)",
      "Slow at first, fast in the middle, slow at the end",
      "Fast at first, slow in the middle, fast at the end"
    ],
    correct: 3,
    explain: "Water rises faster where the container is narrow. An hourglass: wide bottom (slow rise), narrow waist (fast rise), wide top (slow rise). The graph rises steeply at first... wait — actually, when the container is wide, water rises slowly; when narrow, it rises quickly. So a wide-narrow-wide container produces slow-fast-slow. The original NS sampler container is wide at top, narrow in middle, wide at bottom, giving slow-fast-slow."
  },
  {
    type: "mc", topic: "Unit 1 · Relations & Functions",
    q: "If f(x) = 7 + x and f(t) = 15, what is t?",
    options: ["t = 8", "t = 15", "t = 22", "t = 7"],
    correct: 0,
    explain: "Set 7 + t = 15. Subtract 7: t = 8."
  },
  {
    type: "mc", topic: "Unit 1 · Relations & Functions",
    q: "Which of the following describes a discrete relation?",
    options: [
      "Distance travelled vs. time",
      "Number of students vs. classroom",
      "Temperature throughout the day",
      "Height of a falling ball vs. time"
    ],
    correct: 1,
    explain: "Discrete = countable, separate values. You can have 20 or 21 students but not 20.5. The others are continuous (smooth, unbroken values)."
  },

  // ===================================================================
  // UNIT 2 — LINEAR FUNCTIONS
  // ===================================================================
  {
    type: "mc", topic: "Unit 2 · Linear Functions",
    q: "Find the slope of the line through (2, 3) and (8, 15).",
    options: ["6", "12", "2", "1/2"],
    correct: 2,
    explain: "m = (y₂ − y₁) / (x₂ − x₁) = (15 − 3) / (8 − 2) = 12 / 6 = 2."
  },
  {
    type: "mc", topic: "Unit 2 · Linear Functions",
    q: "Which equation represents the line through (2, 10) with slope 3?",
    options: ["y − 10 = 3(x − 2)", "y − 2 = 3(x − 10)", "y + 10 = 3(x + 2)", "y + 2 = 3(x + 10)"],
    correct: 0,
    explain: "Point-slope form: y − y₁ = m(x − x₁). With (2, 10) and m = 3: y − 10 = 3(x − 2)."
  },
  {
    type: "mc", topic: "Unit 2 · Linear Functions",
    q: "What is the x-intercept of 3y − 4x + 12 = 0?",
    options: ["(3, 0)", "(0, 4)", "(−3, 0)", "(0, −4)"],
    correct: 0,
    explain: "Set y = 0: 0 − 4x + 12 = 0 → 4x = 12 → x = 3. The x-intercept is (3, 0)."
  },
  {
    type: "mc", topic: "Unit 2 · Linear Functions",
    q: "Examine the table: (1, 6), (2, 8), (3, 10), (5, 12). Which statement is true?",
    options: [
      "Linear, common difference of 2",
      "Linear, would produce a straight line",
      "Not linear, because change in x isn't constant",
      "Not linear, because Δy/Δx isn't constant"
    ],
    correct: 3,
    explain: "Slope between (1,6) and (2,8): 2/1 = 2. Slope between (3,10) and (5,12): 2/2 = 1. Since Δy/Δx changes, it's not linear."
  },
  {
    type: "mc", topic: "Unit 2 · Linear Functions",
    q: "A line slopes downward and crosses the y-axis below 0. Which (a, b) values fit y = ax + b?",
    options: ["a = 3, b = 2", "a = −3, b = 2", "a = 3, b = −2", "a = −3, b = −2"],
    correct: 3,
    explain: "Negative slope: a < 0. Y-intercept below zero: b < 0. So a = −3, b = −2."
  },
  {
    type: "mc", topic: "Unit 2 · Linear Functions",
    q: "Write the equation of a line with slope 3 and y-intercept −2.",
    options: ["y = 3x − 2", "y = −2x + 3", "y = 3x + 2", "y = −3x − 2"],
    correct: 0,
    explain: "Slope-intercept form: y = mx + b. Here m = 3, b = −2, so y = 3x − 2."
  },
  {
    type: "mc", topic: "Unit 2 · Linear Functions",
    q: "What is the slope of a line PARALLEL to y = (2/3)x + 5?",
    options: ["2/3", "−2/3", "3/2", "−3/2"],
    correct: 0,
    explain: "Parallel lines have the SAME slope. The slope of the given line is 2/3, so the parallel line also has slope 2/3."
  },
  {
    type: "mc", topic: "Unit 2 · Linear Functions",
    q: "What is the slope of a line PERPENDICULAR to y = (2/3)x + 5?",
    options: ["2/3", "−2/3", "3/2", "−3/2"],
    correct: 3,
    explain: "Perpendicular lines have slopes that are NEGATIVE RECIPROCALS. The negative reciprocal of 2/3 is −3/2. Check: (2/3) × (−3/2) = −1. ✓"
  },
  {
    type: "mc", topic: "Unit 2 · Linear Functions", hotzone: true,
    q: "Four scatterplots of correlation are described. Which represents the STRONGEST correlation?",
    options: [
      "r = +0.7 (points loosely upward)",
      "r = −0.95 (points hug a downward line tightly)",
      "r = +0.3 (points scattered, slight upward trend)",
      "r = −0.5 (points spread, downward trend)"
    ],
    correct: 1,
    explain: "STRENGTH of correlation = |r|, the absolute value. Compare: |+0.7| = 0.7, |−0.95| = 0.95, |+0.3| = 0.3, |−0.5| = 0.5. The largest is 0.95. r = −0.95 is just as strong as r = +0.95 — the sign only tells direction."
  },
  {
    type: "mc", topic: "Unit 2 · Linear Functions", hotzone: true,
    q: "Which statement about correlation coefficient r is TRUE?",
    options: [
      "r = +1 means stronger correlation than r = −1",
      "r is the same as the slope of the line of best fit",
      "r close to 0 means there's no linear relationship",
      "r is always positive"
    ],
    correct: 2,
    explain: "r near 0 = weak/no linear correlation (points scattered). r near ±1 = strong correlation. r = +1 and r = −1 are equally strong; the sign indicates direction (upward vs downward), not strength. r is NOT the same as slope."
  },
  {
    type: "mc", topic: "Unit 2 · Linear Functions",
    q: "An amusement park charges $10 entrance plus $3 per ride. What is the total cost for 25 rides?",
    options: ["$75", "$85", "$90", "$95"],
    correct: 1,
    explain: "Cost = 10 + 3x where x = number of rides. For x = 25: Cost = 10 + 3(25) = 10 + 75 = $85."
  },

  // ===================================================================
  // UNIT 3 — SYSTEMS OF LINEAR EQUATIONS
  // ===================================================================
  {
    type: "mc", topic: "Unit 3 · Systems of Linear Equations",
    q: "Solve the system: y = 2x + 1 and 3x + y = 11.",
    options: ["x = 2, y = 5", "x = 5, y = 2", "x = 1, y = 3", "x = 3, y = 7"],
    correct: 0,
    explain: "Substitute y = 2x + 1 into 3x + y = 11: 3x + (2x + 1) = 11 → 5x + 1 = 11 → 5x = 10 → x = 2. Then y = 2(2) + 1 = 5. Solution: (2, 5)."
  },
  {
    type: "mc", topic: "Unit 3 · Systems of Linear Equations",
    q: "Solve the system using elimination: 2x + 3y = 12 and 2x − y = 4.",
    options: ["x = 3, y = 2", "x = 2, y = 3", "x = 4, y = 4/3", "x = 0, y = 4"],
    correct: 0,
    explain: "Subtract the second from the first: (2x + 3y) − (2x − y) = 12 − 4 → 4y = 8 → y = 2. Then 2x + 3(2) = 12 → 2x = 6 → x = 3. Solution: (3, 2)."
  },
  {
    type: "mc", topic: "Unit 3 · Systems of Linear Equations",
    q: "How many solutions does this system have? y = 2x + 5 and y = 2x − 3",
    options: ["One solution", "No solution", "Infinitely many solutions", "Two solutions"],
    correct: 1,
    explain: "Both lines have slope 2 (parallel) but different y-intercepts (5 and −3). Parallel lines never intersect, so there's NO solution."
  },
  {
    type: "mc", topic: "Unit 3 · Systems of Linear Equations",
    q: "Adult tickets cost $12 and child tickets cost $8. A group of 50 people paid $480 in total. How many adult tickets were sold?",
    options: ["20 adult tickets", "30 adult tickets", "10 adult tickets", "40 adult tickets"],
    correct: 0,
    explain: "Let x = adults, y = children. Then x + y = 50 and 12x + 8y = 480. From the first: y = 50 − x. Sub into the second: 12x + 8(50 − x) = 480 → 12x + 400 − 8x = 480 → 4x = 80 → x = 20 adults."
  },
  {
    type: "mc", topic: "Unit 3 · Systems of Linear Equations",
    q: "How many solutions does this system have? 2x + 3y = 6 and 4x + 6y = 12",
    options: ["One solution", "No solution", "Infinitely many solutions", "Cannot be determined"],
    correct: 2,
    explain: "Multiply the first equation by 2: 4x + 6y = 12 — exactly the second equation. They're the same line, so there are infinitely many solutions (every point on the line)."
  },
  {
    type: "written", topic: "Unit 3 · Systems of Linear Equations",
    q: "Organic Pastures Greenhouse sells organic soil at a fixed price per cubic yard plus a flat delivery fee. Anne ordered 10 cubic yards for $135.00. The next week, Sandy ordered 19 cubic yards for $198.00. What is the company's flat-rate delivery charge?",
    solution: "Let p = price per cubic yard, f = flat delivery fee.\n\nAnne:  10p + f = 135  ... (1)\nSandy: 19p + f = 198  ... (2)\n\nElimination — subtract (1) from (2):\n  9p = 63\n  p = $7 per cubic yard\n\nSubstitute into (1):\n  10(7) + f = 135\n  70 + f = 135\n  f = $65\n\nThe flat-rate delivery charge is $65.00."
  },

  // ===================================================================
  // UNIT 4 — TRIGONOMETRY
  // ===================================================================
  {
    type: "mc", topic: "Unit 4 · Trigonometry",
    q: "In which triangle is the value of sin θ the greatest?",
    figure: `<svg viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif;">

      <g transform="translate(170,20)">
        <text x="60" y="-2" font-size="13" font-weight="500">B</text>
        <polygon points="0,60 130,60 130,150" fill="none" stroke="#534AB7" stroke-width="2"/>
        <text x="60" y="50" font-size="13">12</text>
        <text x="135" y="110" font-size="13">5</text>
        <text x="50" y="115" font-size="13">13</text>

      </g>
      <g transform="translate(330,20)">
        <text x="55" y="-2" font-size="13" font-weight="500">C</text>
        <polygon points="0,60 120,60 120,150" fill="none" stroke="#534AB7" stroke-width="2"/>
        <text x="50" y="50" font-size="13">4</text>
        <text x="125" y="110" font-size="13">3</text>
        <text x="55" y="115" font-size="13">5</text>

      <g transform="translate(470,20)">

    explain: "Net = Gross − total deductions. Total deductions = 520 + 260 + 230 + 70 = $1080. Net = 4200 − 1080 = $3120."
  },
  {
    type: "mc", topic: "Unit 8 · Financial Math",
    q: "Which of these is a FIXED expense in a personal budget?",
    options: [
      "Groceries",
      "Movie tickets",
      "Monthly rent",
      "Eating at restaurants"
    ],
    correct: 2,
    explain: "Fixed expenses are recurring with the same amount each month: rent, phone, insurance, subscriptions. Groceries and utilities are variable; movies and restaurants are discretionary."
  },
  {
    type: "mc", topic: "Unit 8 · Financial Math",
    q: "Convert C$500 to US dollars given 1 CAD = 0.74 USD.",
    options: ["US$370", "US$540", "US$675", "US$74"],
    correct: 0,
    explain: "Multiply by the exchange rate: 500 × 0.74 = US$370."
  },
  {
    type: "written", topic: "Unit 8 · Financial Math",
    q: "Joe brought C$250 with him to the Bahamas. The bank rate was C$1 = B$0.7391, but he didn't have time and exchanged at an airport booth, getting B$175.53. How much more money could Joe have gotten by exchanging at the bank?",
    solution: "At the bank rate:\n  C$250 × B$0.7391/C$1 = B$184.775\n\nAt the airport, Joe got: B$175.53\n\nDifference = B$184.775 − B$175.53 = B$9.245\n\nJoe could have gotten approximately B$9.25 more by exchanging at the bank."
  },
  {
    type: "written", topic: "Unit 8 · Financial Math",
    q: "Selim is paid $16.34/hr and works 40 hours a week. He earns 4% commission on all sales. His average gross weekly income is $2050.02. What is the value of his average weekly sales?",
    solution: "Step 1: Find Selim's weekly base wages.\n  Wages = $16.34 × 40 = $653.60\n\nStep 2: Find his commission earnings.\n  Total income − Wages = Commission\n  $2050.02 − $653.60 = $1396.42\n\nStep 3: Find weekly sales from commission.\n  Commission = 4% × Sales\n  $1396.42 = 0.04 × Sales\n  Sales = $1396.42 ÷ 0.04 = $34,910.50\n\nSelim's average weekly sales are $34,910.50."
  },
  {
    type: "written", topic: "Unit 8 · Financial Math",
    q: "Maria earns a net (take-home) pay of $2800 per month. Her monthly expenses are: rent $950, groceries $400, phone & internet $120, gas $150, insurance $180, entertainment $200, savings $300. Is her budget balanced? If not, where could she cut?",
    solution: "Add total expenses:\n  Rent              $950\n  Groceries         $400\n  Phone/internet    $120\n  Gas               $150\n  Insurance         $180\n  Entertainment     $200\n  Savings           $300\n  ─────────────\n  Total          = $2300\n\nCompare to income: $2800 − $2300 = $300 remaining each month.\n\nMaria's budget IS balanced (income > expenses) — she has a $300 monthly surplus.\n\nIf she wanted to save more or absorb an unexpected cost, the easiest cuts are DISCRETIONARY:\n  • Entertainment ($200) — can be reduced or rotated month-to-month.\nSecond-easiest are VARIABLE expenses:\n  • Groceries ($400) and gas ($150) — can flex with planning.\nFIXED expenses (rent, phone, insurance) are hardest to change short-term."
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);

const topics = [
  "Unit 1 · Relations & Functions",
  "Unit 2 · Linear Functions",
  "Unit 3 · Systems of Linear Equations",
  "Unit 4 · Trigonometry",
  "Unit 5 · Polynomials",
  "Unit 6 · Roots & Powers",
  "Unit 7 · Measurement",
  "Unit 8 · Financial Math"
];
const topicStyles = {
  "Unit 1 · Relations & Functions": "background: var(--u1-bg); color: var(--u1-text);",
  "Unit 2 · Linear Functions": "background: var(--u2-bg); color: var(--u2-text);",
  "Unit 3 · Systems of Linear Equations": "background: var(--u3-bg); color: var(--u3-text);",
  "Unit 4 · Trigonometry": "background: var(--u4-bg); color: var(--u4-text);",
  "Unit 5 · Polynomials": "background: var(--u5-bg); color: var(--u5-text);",
  "Unit 6 · Roots & Powers": "background: var(--u6-bg); color: var(--u6-text);",
  "Unit 7 · Measurement": "background: var(--u7-bg); color: var(--u7-text);",
  "Unit 8 · Financial Math": "background: var(--u8-bg); color: var(--u8-text);"
};

function renderTopicBar() {
  const bar = document.getElementById('topic-bar');
  bar.innerHTML = topics.map(t => {
    const count = questions.filter(q => q.topic === t).length;
    const hot = questions.filter(q => q.topic === t && q.hotzone).length;
    if (count === 0) return '';
    const hotLabel = hot > 0 ? ` <span style="opacity: 0.7;">· ${hot} ⚠</span>` : '';
    return `<span class="topic-pill" style="${topicStyles[t]}">${t.split(' · ')[0]} · ${count}${hotLabel}</span>`;
  }).join('');
}

function renderJumpMenu() {
  const sel = document.getElementById('jump');
  sel.innerHTML = questions.map((q, i) => {
    const label = q.type === 'written' ? '✎' : '◉';
    const hot = q.hotzone ? ' ⚠' : '';
    const text = q.q.length > 65 ? q.q.substring(0, 62) + '...' : q.q;
    return `<option value="${i}">${i + 1}. ${label}${hot} [${q.topic.split(' · ')[0]}] ${text}</option>`;
  }).join('');
  sel.value = current;
  sel.onchange = (e) => {
    saveWritten();
    current = parseInt(e.target.value);
    renderQuestion();
  };
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('qcount').textContent = `Question ${current + 1} of ${questions.length}`;

  const mcAnswered = answers.filter((a, i) => questions[i].type === 'mc' && a !== null).length;
  const mcCorrect = answers.filter((a, i) => questions[i].type === 'mc' && a === questions[i].correct).length;
  document.getElementById('score').textContent = `Score: ${mcCorrect} / ${mcAnswered}`;
  document.getElementById('progress-bar').style.width = `${((current + 1) / questions.length) * 100}%`;

  const pill = document.getElementById('topic-pill');
  pill.textContent = q.topic + (q.type === 'written' ? ' · written response' : '');
  pill.setAttribute('style', topicStyles[q.topic]);
  document.getElementById('hotzone-pill').style.display = q.hotzone ? 'inline-block' : 'none';

  document.getElementById('question-text').textContent = q.q;
  const figEl = document.getElementById('question-figure');
  if (q.figure) {
    figEl.innerHTML = q.figure;
    figEl.className = 'figure';
  } else {
    figEl.innerHTML = '';
    figEl.className = '';
  }

  const optsDiv = document.getElementById('options');
  const writtenArea = document.getElementById('written-area');
  const fb = document.getElementById('feedback');
  const solBlock = document.getElementById('solution-block');

  if (q.type === 'mc') {
    optsDiv.style.display = 'block';
    writtenArea.style.display = 'none';
    optsDiv.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = `${String.fromCharCode(65 + i)}.  ${opt}`;
      if (answers[current] !== null) {
        if (i === q.correct) btn.classList.add('correct');
        else if (i === answers[current]) btn.classList.add('incorrect');
        btn.disabled = true;
      } else {
        btn.onclick = () => selectAnswer(i);
      }
      optsDiv.appendChild(btn);
    });

    if (answers[current] !== null) {
      fb.className = 'feedback show ' + (answers[current] === q.correct ? 'right' : 'wrong');
      if (answers[current] === q.correct) {
        fb.innerHTML = `<strong>Correct.</strong> ${q.explain}`;
      } else {
        fb.innerHTML = `<strong>Not quite.</strong> The answer is ${String.fromCharCode(65 + q.correct)}. ${q.explain}`;
      }
    } else {
      fb.className = 'feedback';
    }
  } else {
    optsDiv.style.display = 'none';
    writtenArea.style.display = 'block';
    fb.className = 'feedback';
    document.getElementById('written-answer').value = (typeof answers[current] === 'string' && answers[current] !== 'revealed') ? answers[current] : '';
    if (answers[current] === 'revealed') {
      solBlock.textContent = q.solution;
      solBlock.classList.add('show');
    } else {
      solBlock.classList.remove('show');
      solBlock.textContent = q.solution;
    }
  }

  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').textContent = current === questions.length - 1 ? 'Finish exam' : 'Next →';
  document.getElementById('jump').value = current;
}

function selectAnswer(i) {
  answers[current] = i;
  renderQuestion();
}

function showResults() {
  document.getElementById('header').style.display = 'none';
  document.getElementById('topic-bar').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('question-card').style.display = 'none';
  document.getElementById('nav-row').style.display = 'none';
  document.querySelector('.filter-row').style.display = 'none';
  document.getElementById('results').style.display = 'block';

  const mcQs = questions.filter(q => q.type === 'mc');
  const score = answers.filter((a, i) => questions[i].type === 'mc' && a === questions[i].correct).length;
  const pct = Math.round((score / mcQs.length) * 100);
  document.getElementById('results-summary').textContent = `Multiple choice: ${score} / ${mcQs.length} (${pct}%). Plus ${questions.filter(q => q.type === 'written').length} written-response questions to self-check against the revealed solutions.`;

  document.getElementById('results-breakdown').innerHTML = topics.map(t => {
    const total = questions.filter(q => q.topic === t && q.type === 'mc').length;
    const got = questions.filter((q, i) => q.topic === t && q.type === 'mc' && answers[i] === q.correct).length;
    if (total === 0) return '';
    const shortName = t.split(' · ')[0] + ' · ' + t.split(' · ')[1];
    return `<div class="breakdown-card">
      <div class="breakdown-label" style="${topicStyles[t]}">${shortName}</div>
      <div class="breakdown-score">${got} / ${total}</div>
    </div>`;
  }).join('');
}

function saveWritten() {
  if (questions[current].type === 'written' && answers[current] !== 'revealed') {
    const val = document.getElementById('written-answer').value;
    if (val) answers[current] = val;
  }
}

document.getElementById('prev-btn').onclick = () => {
  saveWritten();
  if (current > 0) { current--; renderQuestion(); }
};
document.getElementById('next-btn').onclick = () => {
  saveWritten();
  if (current < questions.length - 1) { current++; renderQuestion(); }
  else { showResults(); }
};
document.getElementById('reveal-btn').onclick = () => {
  answers[current] = 'revealed';
  document.getElementById('solution-block').classList.add('show');
};
document.getElementById('written-answer').oninput = (e) => {
  if (answers[current] !== 'revealed') {
    answers[current] = e.target.value;
  }
};
document.getElementById('restart-btn').onclick = () => {
  current = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('header').style.display = '';
  document.getElementById('topic-bar').style.display = 'flex';
  document.getElementById('progress-wrap').style.display = '';
  document.getElementById('question-card').style.display = '';
  document.getElementById('nav-row').style.display = 'flex';
  document.querySelector('.filter-row').style.display = 'flex';
  document.getElementById('results').style.display = 'none';
  renderQuestion();
};
document.getElementById('review-btn').onclick = () => {
  current = 0;
  document.getElementById('header').style.display = '';
  document.getElementById('topic-bar').style.display = 'flex';
  document.getElementById('progress-wrap').style.display = '';
  document.getElementById('question-card').style.display = '';
  document.getElementById('nav-row').style.display = 'flex';
  document.querySelector('.filter-row').style.display = 'flex';
  document.getElementById('results').style.display = 'none';
  renderQuestion();
};

renderTopicBar();
renderJumpMenu();
renderQuestion();
</script>
</body>
</html>
